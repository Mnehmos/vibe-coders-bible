name: Bug report
description: Report a bug or escaped failure in the manual, templates, or examples.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Links, commands, screenshots, or files that support the report.
  - type: textarea
    id: ai_context
    attributes:
      label: AI-assisted context
      description: If relevant, describe how AI was used and what verification was missed.
